services:
  # ── PostgreSQL (for ferrox-cp) ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ferrox_cp
      POSTGRES_USER: ferrox
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ferrox}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrox"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Ferrox control plane ──────────────────────────────────────────────────────
  ferrox-cp:
    build:
      context: .
      dockerfile: ferrox-cp/Dockerfile
    image: ghcr.io/shaharia-lab/ferrox-cp:local
    ports:
      - "${CP_PORT:-9090}:${CP_PORT:-9090}"
    environment:
      DATABASE_URL: "postgres://ferrox:${POSTGRES_PASSWORD:-ferrox}@postgres:5432/ferrox_cp"
      CP_ENCRYPTION_KEY: "${CP_ENCRYPTION_KEY}"
      CP_ISSUER: "${CP_ISSUER:-http://localhost:9090}"
      CP_ADMIN_KEY: "${CP_ADMIN_KEY}"
      CP_PORT: "${CP_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${CP_PORT:-9090}/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  # ── Ferrox proxy ─────────────────────────────────────────────────────────────
  ferrox:
    build: .
    image: ferrox:local
    ports:
      - "${FERROX_PORT:-8080}:${FERROX_PORT:-8080}"
    environment:
      FERROX_PORT: "${FERROX_PORT:-8080}"
      # Provider API keys
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GLM_API_KEY: "${GLM_API_KEY:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      # Virtual keys (inbound auth)
      PROXY_KEY_TOKENBANK: "${PROXY_KEY_TOKENBANK:-sk-proxy-dev-key}"
      PROXY_KEY_APP: "${PROXY_KEY_APP:-sk-proxy-app-key}"
      # Usage tracking
      USAGE_DATABASE_URL: "postgres://ferrox:${POSTGRES_PASSWORD:-ferrox}@postgres:5432/ferrox_cp"
      # Telemetry — OTLP endpoint points to lgtm service inside Docker
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4317"
      # Webhook event endpoints
      BILLING_WEBHOOK_URL: "${BILLING_WEBHOOK_URL:-}"
      BILLING_WEBHOOK_TOKEN: "${BILLING_WEBHOOK_TOKEN:-}"
      LLM_PROXY_CONFIG: /app/config/config.yaml
    # Allows the gateway to reach services running on the host machine
    # (e.g. billing webhooks at http://host.docker.internal:<port>/...).
    # Works on Linux (Docker 20.10+), Mac, and Windows Docker Desktop.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ferrox/config:/app/config:ro
    depends_on:
      lgtm:
        condition: service_healthy
      ferrox-cp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${FERROX_PORT:-8080}/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ── LGTM all-in-one (Loki + Grafana + Tempo + Mimir + OTEL Collector) ────────
  # Exposes:
  #   3000  — Grafana UI  (admin / admin)
  #   4317  — OTLP gRPC ingestion
  #   4318  — OTLP HTTP  ingestion
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - lgtm-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  lgtm-data:
