services:
  # ── Ferrox proxy ─────────────────────────────────────────────────────────────
  ferrox:
    build: .
    image: ferrox:local
    ports:
      - "8080:8080"
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      LLM_PROXY_CONFIG: /app/config/config.yaml
    volumes:
      - ./ferrox/config:/app/config:ro
    depends_on:
      lgtm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ── LGTM all-in-one (Loki + Grafana + Tempo + Mimir + OTEL Collector) ────────
  # Exposes:
  #   3000  — Grafana UI  (admin / admin)
  #   4317  — OTLP gRPC ingestion
  #   4318  — OTLP HTTP  ingestion
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - lgtm-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  lgtm-data:
