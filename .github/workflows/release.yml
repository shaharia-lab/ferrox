name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Cross-platform binaries ───────────────────────────────────────────────────
  upload-assets:
    name: Upload binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Upload ferrox binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ferrox
          manifest-path: ferrox/Cargo.toml
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload ferrox-cp binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ferrox-cp
          manifest-path: ferrox-cp/Cargo.toml
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker image — multi-platform, push to GHCR ───────────────────────────────
  # Uses pre-built binaries from upload-assets to avoid slow QEMU ARM64 recompilation.
  docker:
    name: Docker image
    needs: upload-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Download and verify Linux binaries from release
        run: |
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/shaharia-lab/ferrox/releases/download/${VERSION}"

          # amd64 — download, verify checksum, then extract
          curl -fsSL "${BASE}/ferrox-x86_64-unknown-linux-gnu.tar.gz"        -o ferrox-x86_64-unknown-linux-gnu.tar.gz
          curl -fsSL "${BASE}/ferrox-x86_64-unknown-linux-gnu.tar.gz.sha256" -o ferrox-x86_64-unknown-linux-gnu.tar.gz.sha256
          sha256sum --check ferrox-x86_64-unknown-linux-gnu.tar.gz.sha256
          tar xzf ferrox-x86_64-unknown-linux-gnu.tar.gz
          mv ferrox ferrox-amd64

          # arm64 — download, verify checksum, then extract
          curl -fsSL "${BASE}/ferrox-aarch64-unknown-linux-gnu.tar.gz"        -o ferrox-aarch64-unknown-linux-gnu.tar.gz
          curl -fsSL "${BASE}/ferrox-aarch64-unknown-linux-gnu.tar.gz.sha256" -o ferrox-aarch64-unknown-linux-gnu.tar.gz.sha256
          sha256sum --check ferrox-aarch64-unknown-linux-gnu.tar.gz.sha256
          tar xzf ferrox-aarch64-unknown-linux-gnu.tar.gz
          mv ferrox ferrox-arm64

      - name: Set up QEMU (for multi-arch manifest only — no compilation)
        uses: docker/setup-qemu-action@v3

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── ferrox-cp Docker image ────────────────────────────────────────────────────
  # Uses pre-built ferrox-cp binaries to avoid slow QEMU ARM64 recompilation.
  docker-cp:
    name: Docker image (ferrox-cp)
    needs: upload-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ferrox-cp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Download and verify Linux binaries from release
        run: |
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/shaharia-lab/ferrox/releases/download/${VERSION}"

          # amd64 — download, verify checksum, then extract
          curl -fsSL "${BASE}/ferrox-cp-x86_64-unknown-linux-gnu.tar.gz"        -o ferrox-cp-x86_64-unknown-linux-gnu.tar.gz
          curl -fsSL "${BASE}/ferrox-cp-x86_64-unknown-linux-gnu.tar.gz.sha256" -o ferrox-cp-x86_64-unknown-linux-gnu.tar.gz.sha256
          sha256sum --check ferrox-cp-x86_64-unknown-linux-gnu.tar.gz.sha256
          tar xzf ferrox-cp-x86_64-unknown-linux-gnu.tar.gz
          mv ferrox-cp ferrox-cp-amd64

          # arm64 — download, verify checksum, then extract
          curl -fsSL "${BASE}/ferrox-cp-aarch64-unknown-linux-gnu.tar.gz"        -o ferrox-cp-aarch64-unknown-linux-gnu.tar.gz
          curl -fsSL "${BASE}/ferrox-cp-aarch64-unknown-linux-gnu.tar.gz.sha256" -o ferrox-cp-aarch64-unknown-linux-gnu.tar.gz.sha256
          sha256sum --check ferrox-cp-aarch64-unknown-linux-gnu.tar.gz.sha256
          tar xzf ferrox-cp-aarch64-unknown-linux-gnu.tar.gz
          mv ferrox-cp ferrox-cp-arm64

      - name: Set up QEMU (for multi-arch manifest only — no compilation)
        uses: docker/setup-qemu-action@v3

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ferrox-cp/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Homebrew tap ──────────────────────────────────────────────────────────────
  homebrew:
    name: Update Homebrew formula
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formulas
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          VERSION_CLASS=$(echo "$VERSION_NUM" | tr -d '.')

          echo "Calculating SHA256 checksums..."
          SHA_MACOS_X86=$(curl -sL "https://github.com/shaharia-lab/ferrox/releases/download/${VERSION}/ferrox-x86_64-apple-darwin.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_MACOS_ARM=$(curl -sL "https://github.com/shaharia-lab/ferrox/releases/download/${VERSION}/ferrox-aarch64-apple-darwin.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_X86=$(curl -sL "https://github.com/shaharia-lab/ferrox/releases/download/${VERSION}/ferrox-x86_64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_ARM=$(curl -sL "https://github.com/shaharia-lab/ferrox/releases/download/${VERSION}/ferrox-aarch64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)

          MAIN_FORMULA='# typed: false
          # frozen_string_literal: true

          class Ferrox < Formula
            desc "High-performance, stateless LLM API gateway"
            homepage "https://github.com/shaharia-lab/ferrox"
            version "'"${VERSION_NUM}"'"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-x86_64-apple-darwin.tar.gz"
                sha256 "'"${SHA_MACOS_X86}"'"
                def install
                  bin.install "ferrox"
                end
              end
              if Hardware::CPU.arm?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-aarch64-apple-darwin.tar.gz"
                sha256 "'"${SHA_MACOS_ARM}"'"
                def install
                  bin.install "ferrox"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "'"${SHA_LINUX_X86}"'"
                def install
                  bin.install "ferrox"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "'"${SHA_LINUX_ARM}"'"
                def install
                  bin.install "ferrox"
                end
              end
            end

            test do
              system "#{bin}/ferrox", "--version"
            end
          end'

          VERSIONED_FORMULA='# typed: false
          # frozen_string_literal: true

          class FerroxAT'"${VERSION_CLASS}"' < Formula
            desc "High-performance, stateless LLM API gateway"
            homepage "https://github.com/shaharia-lab/ferrox"
            version "'"${VERSION_NUM}"'"
            license "MIT"

            keg_only :versioned_formula

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-x86_64-apple-darwin.tar.gz"
                sha256 "'"${SHA_MACOS_X86}"'"
                def install
                  bin.install "ferrox"
                end
              end
              if Hardware::CPU.arm?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-aarch64-apple-darwin.tar.gz"
                sha256 "'"${SHA_MACOS_ARM}"'"
                def install
                  bin.install "ferrox"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "'"${SHA_LINUX_X86}"'"
                def install
                  bin.install "ferrox"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/shaharia-lab/ferrox/releases/download/'"${VERSION}"'/ferrox-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "'"${SHA_LINUX_ARM}"'"
                def install
                  bin.install "ferrox"
                end
              end
            end

            test do
              system "#{bin}/ferrox", "--version"
            end
          end'

          MAIN_SHA=$(gh api "repos/shaharia-lab/homebrew-tap/contents/Formula/ferrox.rb" --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$MAIN_SHA" ]; then
            gh api --method PUT "repos/shaharia-lab/homebrew-tap/contents/Formula/ferrox.rb" \
              -f message="ferrox ${VERSION_NUM}" \
              -f content="$(echo "$MAIN_FORMULA" | base64 -w0)" \
              -f sha="$MAIN_SHA" \
              -f branch="main"
          else
            gh api --method PUT "repos/shaharia-lab/homebrew-tap/contents/Formula/ferrox.rb" \
              -f message="ferrox ${VERSION_NUM}" \
              -f content="$(echo "$MAIN_FORMULA" | base64 -w0)" \
              -f branch="main"
          fi

          if gh api "repos/shaharia-lab/homebrew-tap/contents/Formula/ferrox@${VERSION_NUM}.rb" --silent 2>/dev/null; then
            echo "Versioned formula ferrox@${VERSION_NUM}.rb already exists, skipping"
          else
            gh api --method PUT "repos/shaharia-lab/homebrew-tap/contents/Formula/ferrox@${VERSION_NUM}.rb" \
              -f message="Add ferrox@${VERSION_NUM} versioned formula" \
              -f content="$(echo "$VERSIONED_FORMULA" | base64 -w0)" \
              -f branch="main"
          fi

          echo "Homebrew formulas updated successfully!"
