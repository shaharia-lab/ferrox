# ─────────────────────────────────────────
# Ferrox — example configuration
# All sensitive values use ${VAR} env var references.
# Place real keys in a .env file (local dev) or K8s Secret (production).
# ─────────────────────────────────────────

# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8080
  graceful_shutdown_timeout_secs: 30
  max_request_body_bytes: 10485760   # 10 MB

  # Split timeouts — do NOT use a single flat timeout for LLM streams.
  # Reasoning models can be slow to start but actively stream for minutes.
  timeouts:
    connect_secs: 10      # TCP + TLS handshake to provider
    ttfb_secs: 60         # max wait for first SSE chunk (reasoning models can be slow)
    idle_secs: 30         # max silence between consecutive SSE chunks

# ─────────────────────────────────────────
# Telemetry
# ─────────────────────────────────────────
telemetry:
  log_level: info    # trace|debug|info|warn|error — override with LOG_LEVEL env var
  log_format: json   # json | text (default: text) — set to json for log aggregators

  metrics:
    enabled: true
    path: "/metrics"

  tracing:
    enabled: "${OTEL_ENABLED:-false}"
    otlp_endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"
    service_name: "ferrox"
    service_version: "0.1.0"
    sample_rate: 1.0

# ─────────────────────────────────────────
# Defaults (applied to all providers unless overridden)
# ─────────────────────────────────────────
defaults:
  timeouts:
    connect_secs: 10
    ttfb_secs: 60
    idle_secs: 30
  retry:
    max_attempts: 3
    initial_backoff_ms: 100
    max_backoff_ms: 2000
    jitter: true
  circuit_breaker:
    failure_threshold: 5
    success_threshold: 2
    recovery_timeout_secs: 30

# ─────────────────────────────────────────
# Providers
# Multiple entries of the same type = multiple API keys or base URLs
# ─────────────────────────────────────────
providers:
  - name: anthropic-primary
    type: anthropic
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    timeouts:
      connect_secs: 10
      ttfb_secs: 60
      idle_secs: 30
    retry:
      max_attempts: 2
    circuit_breaker:
      failure_threshold: 3

  - name: anthropic-secondary        # second API key → doubles rate limit budget
    type: anthropic
    api_key: "${ANTHROPIC_API_KEY_2:-placeholder}"
    base_url: "https://api.anthropic.com"

  - name: openai-primary
    type: openai
    api_key: "${OPENAI_API_KEY:-placeholder}"
    base_url: "https://api.openai.com/v1"

  - name: gemini-primary
    type: gemini
    api_key: "${GEMINI_API_KEY:-placeholder}"
    base_url: "https://generativelanguage.googleapis.com"

  - name: bedrock-primary
    type: bedrock
    region: "${AWS_REGION:-us-east-1}"
    # No api_key — uses AWS credential chain (env vars, instance role, IRSA)

  - name: glm-primary
    type: glm
    api_key: "${GLM_API_KEY:-placeholder}"
    base_url: "https://api.z.ai/api/paas/v4"
    # Use https://api.z.ai/api/coding/paas/v4 for the GLM Coding Plan

# ─────────────────────────────────────────
# Model routing
# Each alias maps to a RoutePool with targets + optional fallback chain
# ─────────────────────────────────────────
models:
  - alias: "claude-sonnet"
    routing:
      strategy: weighted             # round_robin | weighted | failover | random
      targets:
        - provider: anthropic-primary
          model_id: "claude-sonnet-4-20250514"
          weight: 70
        - provider: anthropic-secondary
          model_id: "claude-sonnet-4-20250514"
          weight: 30
      fallback:
        - provider: bedrock-primary
          model_id: "anthropic.claude-3-5-sonnet-20241022-v2:0"

  - alias: "claude-opus"
    routing:
      strategy: failover
      targets:
        - provider: anthropic-primary
          model_id: "claude-opus-4-20250514"
      fallback:
        - provider: bedrock-primary
          model_id: "anthropic.claude-opus-4-5:0"

  - alias: "claude-haiku"
    routing:
      strategy: round_robin
      targets:
        - provider: anthropic-primary
          model_id: "claude-haiku-4-5-20251001"
        - provider: anthropic-secondary
          model_id: "claude-haiku-4-5-20251001"

  - alias: "gpt-4o"
    routing:
      strategy: failover
      targets:
        - provider: openai-primary
          model_id: "gpt-4o"
      fallback: []

  - alias: "gemini-flash"
    routing:
      strategy: failover
      targets:
        - provider: gemini-primary
          model_id: "gemini-2.5-flash-lite"

  - alias: "glm-4"
    routing:
      strategy: failover
      targets:
        - provider: glm-primary
          model_id: "GLM-4.7"

# ─────────────────────────────────────────
# Usage tracking (optional)
# Persist per-request token usage to PostgreSQL.
# Points to the same database as ferrox-cp (usage_log table).
# When absent, usage recording is disabled.
# ─────────────────────────────────────────
# usage_database_url: "${USAGE_DATABASE_URL:-postgres://ferrox:ferrox@localhost:5432/ferrox_cp}"

# ─────────────────────────────────────────
# Rate limiting backend (optional — default: memory)
# Set backend: redis for distributed enforcement across replicas.
# ─────────────────────────────────────────
# rate_limiting:
#   backend: memory            # memory (default, per-instance) | redis (distributed)
#   redis_url: "redis://localhost:6379"   # required only when backend: redis
#   redis_key_prefix: "ferrox:rl:"       # optional, default shown
#   redis_pool_size: 10                  # optional, default shown
#   redis_fail_open: true                # allow requests when Redis is unavailable

# ─────────────────────────────────────────
# Trusted JWT issuers (optional — for JWKS-based auth)
# Clients can authenticate with a signed JWT instead of a static virtual key.
# Ferrox fetches the JWKS from each issuer and validates the JWT signature.
# ─────────────────────────────────────────
# trusted_issuers:
#   - issuer: "https://accounts.google.com"
#     jwks_uri: "https://www.googleapis.com/oauth2/v3/certs"
#     audience: "my-ferrox-gateway"    # optional; validated if present
#
#   - issuer: "https://login.microsoftonline.com/<tenant>/v2.0"
#     jwks_uri: "https://login.microsoftonline.com/<tenant>/discovery/v2.0/keys"
#
#   - issuer: "https://your-okta-domain.okta.com/oauth2/default"
#     jwks_uri: "https://your-okta-domain.okta.com/oauth2/default/v1/keys"

# JWKS cache TTL in seconds (default: 300).
# Keys are refreshed proactively at 80% of this value in the background.
# jwks_cache_ttl_secs: 300

# ─────────────────────────────────────────
# Virtual keys (inbound auth)
# ─────────────────────────────────────────
virtual_keys:
  - key: "${PROXY_KEY_TOKENBANK:-sk-proxy-dev-key}"
    name: "tokenbank-service"
    allowed_models: ["*"]             # wildcard = all aliases
    rate_limit:
      requests_per_minute: 600
      burst: 100

  - key: "${PROXY_KEY_APP:-sk-proxy-app-key}"
    name: "my-app"
    allowed_models:
      - "claude-sonnet"
      - "gpt-4o"
    rate_limit:
      requests_per_minute: 120
      burst: 20

# ─────────────────────────────────────────
# Event webhook endpoints (optional)
# Push per-request token usage events to external systems in real time.
# Each endpoint receives an async HTTP POST with a JSON payload.
# ─────────────────────────────────────────
