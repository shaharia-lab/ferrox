repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: true

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: validate-config-schema
        name: validate config schema
        entry: bash -c 'if command -v check-jsonschema >/dev/null 2>&1; then find . -name "config*.yaml" -o -name "config*.yml" | grep -v ".pre-commit" | xargs -I{} check-jsonschema --schemafile ferrox/config.schema.json {} 2>/dev/null || true; fi'
        language: system
        files: \.(yaml|yml|json)$
        pass_filenames: false
